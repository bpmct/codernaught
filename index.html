<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Codernaught</title>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>
<div id="app">
  <header>
    <span class="logo">⬡</span>
    <h1>Codernaught</h1>
    <p>Animation Studio</p>
  </header>
  <main>
    <div id="stage">
      <!--
        Coordinate system design (all in SVG units):
        • viewBox: 0 0 320 480
        • Robot centre-line: x=160
        • "floor" y=458

        Key anchor points (in the LOCAL space of their parent):
          #body-wrap  — whole-robot translate/squash (pivot 160,458 for squash)
            #ll       — left  leg,   pivot 0,0 relative to group origin
            #rl       — right leg,   pivot 0,0 relative to group origin
            #la       — left  arm,   pivot 0,0
            #ra       — right arm,   pivot 0,0
            #neck     — static
            #head     — pivot 0,0 (neck base)
            #torso    — static shell

        EVERY part is a child of #body-wrap. Whole-body y-offset and
        squash go on #body-wrap ONLY.  Individual limb rotations use
        transform-origin: 0 0 and are pre-translated to the joint.
      -->
      <svg id="svg" viewBox="0 0 320 480" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gMetal" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#5c5c5c"/>
            <stop offset="45%"  stop-color="#303030"/>
            <stop offset="100%" stop-color="#1a1a1a"/>
          </linearGradient>
          <linearGradient id="gMetalL" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#7a7a7a"/>
            <stop offset="50%"  stop-color="#484848"/>
            <stop offset="100%" stop-color="#2e2e2e"/>
          </linearGradient>
          <linearGradient id="gBody" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#1e2d3e"/>
            <stop offset="100%" stop-color="#10181f"/>
          </linearGradient>
          <linearGradient id="gLeg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#404040"/>
            <stop offset="100%" stop-color="#1e1e1e"/>
          </linearGradient>
          <linearGradient id="gArm" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#424242"/>
            <stop offset="100%" stop-color="#222"/>
          </linearGradient>
          <linearGradient id="gScreen" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#060f1c"/>
            <stop offset="100%" stop-color="#0b1e30"/>
          </linearGradient>
          <linearGradient id="gOrange" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#FF8033"/>
            <stop offset="100%" stop-color="#E85A0A"/>
          </linearGradient>
          <radialGradient id="gEye" cx="38%" cy="32%" r="62%">
            <stop offset="0%"   stop-color="#FFD060"/>
            <stop offset="45%"  stop-color="#FF7A20"/>
            <stop offset="100%" stop-color="#CC3300"/>
          </radialGradient>
          <radialGradient id="gPupil" cx="33%" cy="28%" r="68%">
            <stop offset="0%"   stop-color="#fff"/>
            <stop offset="100%" stop-color="#ccc"/>
          </radialGradient>
          <radialGradient id="gAnt" cx="50%" cy="50%" r="50%">
            <stop offset="0%"   stop-color="#FFB040"/>
            <stop offset="55%"  stop-color="#FF6A1A"/>
            <stop offset="100%" stop-color="#CC3300" stop-opacity="0"/>
          </radialGradient>
          <filter id="fDrop" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.6"/>
          </filter>
          <filter id="fGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="fSoft" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="2.5" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- floor -->
        <line x1="0" y1="462" x2="320" y2="462" stroke="#222" stroke-width="1"/>
        <line x1="0" y1="470" x2="320" y2="470" stroke="#1a1a1a" stroke-width="1"/>

        <!-- shadow lives OUTSIDE body-wrap so it stays on the floor -->
        <ellipse id="shadow" cx="160" cy="463" rx="72" ry="10" fill="#000" opacity="0.32"/>

        <!--
          ╔══════════════════════════════════════════════════════╗
          ║  #body-wrap — translate this for whole-body motion  ║
          ║  ALL parts are children → pivots stay glued         ║
          ╚══════════════════════════════════════════════════════╝
          Natural standing: body-wrap at translate(0,0)
          Floor contact: feet bottom ≈ y=460 in world space
        -->
        <g id="body-wrap">

          <!-- ══ LEFT LEG  — pivot at hip (124, 332) ══ -->
          <!-- translate to hip, rotate, translate back -->
          <g id="ll" transform="translate(124,332)">
            <!-- everything drawn relative to (0,0) = hip joint -->
            <rect x="-16" y="0"  width="32" height="60" rx="9"  fill="url(#gLeg)"  stroke="#4a4a4a" stroke-width="1.2"/>
            <ellipse cx="0" cy="62" rx="13" ry="11" fill="url(#gMetalL)" stroke="#5a5a5a" stroke-width="1.5"/>
            <!-- lower leg — pivot at knee (0,62) in ll's space -->
            <g id="ll2" transform="translate(0,62)">
              <rect x="-15" y="0"  width="30" height="52" rx="8"  fill="url(#gLeg)"  stroke="#4a4a4a" stroke-width="1.2"/>
              <rect x="-28" y="45" width="56" height="20" rx="10" fill="url(#gMetalL)" stroke="#5a5a5a" stroke-width="1.5"/>
              <rect x="-24" y="49" width="48" height="5"  rx="2.5" fill="#2a2a2a" opacity="0.7"/>
            </g>
          </g>

          <!-- ══ RIGHT LEG — pivot at hip (196, 332) ══ -->
          <g id="rl" transform="translate(196,332)">
            <rect x="-16" y="0"  width="32" height="60" rx="9"  fill="url(#gLeg)"  stroke="#4a4a4a" stroke-width="1.2"/>
            <ellipse cx="0" cy="62" rx="13" ry="11" fill="url(#gMetalL)" stroke="#5a5a5a" stroke-width="1.5"/>
            <g id="rl2" transform="translate(0,62)">
              <rect x="-15" y="0"  width="30" height="52" rx="8"  fill="url(#gLeg)"  stroke="#4a4a4a" stroke-width="1.2"/>
              <rect x="-28" y="45" width="56" height="20" rx="10" fill="url(#gMetalL)" stroke="#5a5a5a" stroke-width="1.5"/>
              <rect x="-24" y="49" width="48" height="5"  rx="2.5" fill="#2a2a2a" opacity="0.7"/>
            </g>
          </g>

          <!-- ══ TORSO ══ -->
          <g id="torso" filter="url(#fDrop)">
            <rect x="84"  y="185" width="152" height="152" rx="18" fill="url(#gMetal)" stroke="#5a5a5a" stroke-width="1.5"/>
            <rect x="93"  y="193" width="134" height="136" rx="13" fill="url(#gBody)" stroke="#2c3e52" stroke-width="1.2"/>
            <!-- CODER badge -->
            <rect x="102" y="252" width="116" height="46" rx="9" fill="#090909" stroke="#1e2e1e" stroke-width="1"/>
            <text x="160" y="282" text-anchor="middle"
                  font-family="'Courier New',monospace" font-size="22"
                  font-weight="900" letter-spacing="3" fill="url(#gOrange)">CODER</text>
            <!-- LEDs -->
            <g id="leds" transform="translate(160,314)">
              <rect x="-38" y="-8" width="76" height="16" rx="5" fill="#050505" stroke="#1a1a1a" stroke-width="1"/>
              <circle id="l1" cx="-28" cy="0" r="4.5" fill="#FF8033"/>
              <circle id="l2" cx="-14" cy="0" r="4.5" fill="#FF8033"/>
              <circle id="l3" cx="0"   cy="0" r="4.5" fill="#FF8033"/>
              <circle id="l4" cx="14"  cy="0" r="4.5" fill="#FF8033"/>
              <circle id="l5" cx="28"  cy="0" r="4.5" fill="#FF8033"/>
            </g>
            <!-- bolts -->
            <circle cx="93"  cy="202" r="5.5" fill="url(#gMetalL)" stroke="#686868" stroke-width="1.2"/>
            <circle cx="93"  cy="325" r="5.5" fill="url(#gMetalL)" stroke="#686868" stroke-width="1.2"/>
            <circle cx="227" cy="202" r="5.5" fill="url(#gMetalL)" stroke="#686868" stroke-width="1.2"/>
            <circle cx="227" cy="325" r="5.5" fill="url(#gMetalL)" stroke="#686868" stroke-width="1.2"/>
            <!-- hip bar -->
            <rect x="96" y="328" width="128" height="12" rx="6" fill="url(#gMetalL)" stroke="#5a5a5a" stroke-width="1"/>
            <rect x="112" y="331" width="24" height="6" rx="3" fill="#202020"/>
            <rect x="184" y="331" width="24" height="6" rx="3" fill="#202020"/>
          </g>

          <!-- ══ LEFT ARM — pivot at shoulder (84, 210) ══ -->
          <g id="la" transform="translate(84,210)">
            <!-- upper arm extends left — goes 10px inward to overlap torso during rotation -->
            <rect x="-58" y="-12" width="72" height="26" rx="11" fill="url(#gArm)" stroke="#484848" stroke-width="1.2"/>
            <!-- shoulder ball drawn ON TOP of arm rect -->
            <circle cx="0" cy="0" r="22" fill="url(#gMetalL)" stroke="#686868" stroke-width="1.5"/>
            <circle cx="-3" cy="-3" r="5.5" fill="#444" opacity="0.45"/>
            <!-- elbow pivot at (-58, 1) in la space -->
            <g id="la2" transform="translate(-58,1)">
              <circle cx="0" cy="0" r="13" fill="url(#gMetalL)" stroke="#686868" stroke-width="1.5"/>
              <!-- forearm extends further left -->
              <rect x="-36" y="-11" width="38" height="22" rx="9" fill="url(#gArm)" stroke="#484848" stroke-width="1.2"/>
              <!-- hand -->
              <rect x="-46" y="-16" width="24" height="34" rx="11" fill="url(#gMetalL)" stroke="#686868" stroke-width="1.5"/>
              <rect x="-50" y="-16" width="8"  height="15" rx="4"  fill="#363636" stroke="#505050" stroke-width="1"/>
              <rect x="-50" y="3"   width="8"  height="15" rx="4"  fill="#363636" stroke="#505050" stroke-width="1"/>
            </g>
          </g>

          <!-- ══ RIGHT ARM — pivot at shoulder (236, 210) ══ -->
          <g id="ra" transform="translate(236,210)">
            <!-- upper arm extends right — goes 10px inward to overlap torso during rotation -->
            <rect x="-14" y="-12" width="72" height="26" rx="11" fill="url(#gArm)" stroke="#484848" stroke-width="1.2"/>
            <!-- shoulder ball drawn ON TOP of arm rect -->
            <circle cx="0" cy="0" r="22" fill="url(#gMetalL)" stroke="#686868" stroke-width="1.5"/>
            <circle cx="3" cy="-3" r="5.5" fill="#444" opacity="0.45"/>
            <g id="ra2" transform="translate(58,1)">
              <circle cx="0" cy="0" r="13" fill="url(#gMetalL)" stroke="#686868" stroke-width="1.5"/>
              <rect x="-2"  y="-11" width="38" height="22" rx="9"  fill="url(#gArm)" stroke="#484848" stroke-width="1.2"/>
              <rect x="22"  y="-16" width="24" height="34" rx="11" fill="url(#gMetalL)" stroke="#686868" stroke-width="1.5"/>
              <rect x="42"  y="-16" width="8"  height="15" rx="4"  fill="#363636" stroke="#505050" stroke-width="1"/>
              <rect x="42"  y="3"   width="8"  height="15" rx="4"  fill="#363636" stroke="#505050" stroke-width="1"/>
            </g>
          </g>

          <!-- ══ NECK ══ -->
          <rect x="143" y="163" width="34" height="27" rx="8" fill="url(#gMetalL)" stroke="#5e5e5e" stroke-width="1.5"/>
          <rect x="148" y="168" width="24" height="5"  rx="2.5" fill="#222" stroke="#404040" stroke-width="0.8"/>
          <rect x="148" y="177" width="24" height="5"  rx="2.5" fill="#222" stroke="#404040" stroke-width="0.8"/>

          <!-- ══ HEAD — pivot at neck base (160, 170) ══ -->
          <g id="head" transform="translate(160,170)">
            <!-- drawn relative to (0,0) = neck base -->

            <!-- antenna -->
            <line x1="0" y1="-112" x2="0" y2="-140" stroke="#555" stroke-width="4" stroke-linecap="round"/>
            <circle cx="0" cy="-148" r="16" fill="url(#gAnt)" opacity="0.45"/>
            <circle id="ant" cx="0" cy="-148" r="10" fill="url(#gOrange)" filter="url(#fGlow)"/>
            <circle cx="-4" cy="-152" r="4" fill="#fff" opacity="0.5"/>

            <!-- skull -->
            <rect x="-66" y="-114" width="132" height="116" rx="20" fill="url(#gMetal)" stroke="#606060" stroke-width="2" filter="url(#fDrop)"/>
            <rect x="-57" y="-106" width="114" height="100" rx="15" fill="url(#gBody)" stroke="#2c3e52" stroke-width="1.2"/>

            <!-- ears -->
            <rect x="-71" y="-90" width="18" height="46" rx="6" fill="url(#gMetalL)" stroke="#686868" stroke-width="1.3"/>
            <rect x="53"  y="-90" width="18" height="46" rx="6" fill="url(#gMetalL)" stroke="#686868" stroke-width="1.3"/>
            <rect x="-68" y="-83" width="12" height="3.5" rx="1.8" fill="#111"/>
            <rect x="-68" y="-76" width="12" height="3.5" rx="1.8" fill="#111"/>
            <rect x="-68" y="-69" width="12" height="3.5" rx="1.8" fill="#111"/>
            <rect x="-68" y="-62" width="12" height="3.5" rx="1.8" fill="#111"/>
            <rect x="56"  y="-83" width="12" height="3.5" rx="1.8" fill="#111"/>
            <rect x="56"  y="-76" width="12" height="3.5" rx="1.8" fill="#111"/>
            <rect x="56"  y="-69" width="12" height="3.5" rx="1.8" fill="#111"/>
            <rect x="56"  y="-62" width="12" height="3.5" rx="1.8" fill="#111"/>

            <!-- visor -->
            <rect x="-52" y="-102" width="104" height="24" rx="8" fill="url(#gScreen)" stroke="#1a4888" stroke-width="1.8" filter="url(#fSoft)"/>
            <rect id="vscan" x="-48" y="-98" width="18" height="14" rx="4" fill="#FF8033" opacity="0.9"/>
            <circle cx="40" cy="-90" r="4" fill="#FF8033" opacity="0.65"/>
            <circle cx="31" cy="-90" r="4" fill="#FF8033" opacity="0.35"/>

            <!-- eye sockets -->
            <rect x="-49" y="-71" width="44" height="38" rx="12" fill="url(#gScreen)" stroke="#1a4888" stroke-width="1.8"/>
            <rect x="5"   y="-71" width="44" height="38" rx="12" fill="url(#gScreen)" stroke="#1a4888" stroke-width="1.8"/>

            <!-- irises -->
            <ellipse id="le"  cx="-27" cy="-52" rx="14" ry="13" fill="url(#gEye)"   filter="url(#fGlow)"/>
            <ellipse id="re"  cx="27"  cy="-52" rx="14" ry="13" fill="url(#gEye)"   filter="url(#fGlow)"/>
            <!-- pupils -->
            <circle  id="lp"  cx="-27" cy="-52" r="6.5" fill="url(#gPupil)"/>
            <circle  id="rp"  cx="27"  cy="-52" r="6.5" fill="url(#gPupil)"/>
            <!-- glints -->
            <circle cx="-23" cy="-56" r="3" fill="#fff" opacity="0.9"/>
            <circle cx="31"  cy="-56" r="3" fill="#fff" opacity="0.9"/>

            <!-- eyebrow bars -->
            <rect id="lbrow" x="-47" y="-74" width="40" height="5" rx="2.5" fill="#FF8033" opacity="0"/>
            <rect id="rbrow" x="7"   y="-74" width="40" height="5" rx="2.5" fill="#FF8033" opacity="0"/>

            <!-- mouth -->
            <g id="mouth">
              <rect x="-37" y="-23" width="74" height="13" rx="5.5" fill="url(#gScreen)" stroke="#1a4888" stroke-width="1.3"/>
              <rect id="mp1" x="-33" y="-20" width="8" height="7" rx="2.5" fill="#FF8033" opacity="0.9"/>
              <rect id="mp2" x="-22" y="-20" width="8" height="7" rx="2.5" fill="#FF8033" opacity="0.9"/>
              <rect id="mp3" x="-11" y="-20" width="8" height="7" rx="2.5" fill="#FF8033" opacity="0.9"/>
              <rect id="mp4" x="0"   y="-20" width="8" height="7" rx="2.5" fill="#FF8033" opacity="0.9"/>
              <rect id="mp5" x="11"  y="-20" width="8" height="7" rx="2.5" fill="#FF8033" opacity="0.9"/>
              <rect id="mp6" x="22"  y="-20" width="8" height="7" rx="2.5" fill="#FF8033" opacity="0.9"/>
            </g>

            <!-- corner bolts -->
            <circle cx="-52" cy="-100" r="4.5" fill="url(#gMetalL)" stroke="#787878" stroke-width="1"/>
            <circle cx="52"  cy="-100" r="4.5" fill="url(#gMetalL)" stroke="#787878" stroke-width="1"/>
            <circle cx="-52" cy="-4"   r="4.5" fill="url(#gMetalL)" stroke="#787878" stroke-width="1"/>
            <circle cx="52"  cy="-4"   r="4.5" fill="url(#gMetalL)" stroke="#787878" stroke-width="1"/>
          </g><!-- /head -->

        </g><!-- /body-wrap -->
      </svg>

      <div id="anim-label">IDLE</div>
    </div><!-- /stage -->

    <!-- ── CONTROLS ── -->
    <div id="controls">
      <div class="control-group">
        <h3>Animations</h3>
        <div class="btn-grid">
          <button data-anim="idle"  class="btn active">Idle</button>
          <button data-anim="walk"  class="btn">Walk</button>
          <button data-anim="run"   class="btn">Run</button>
          <button data-anim="jump"  class="btn">Jump</button>
          <button data-anim="wave"  class="btn">Wave</button>
          <button data-anim="think" class="btn">Think</button>
          <button data-anim="party" class="btn">Party 🎉</button>
          <button data-anim="cheer" class="btn">Cheer</button>
          <button data-anim="sneak" class="btn">Sneak</button>
          <button data-anim="fall"  class="btn">Fall</button>
        </div>
      </div>
      <div class="control-group">
        <h3>Expressions</h3>
        <div class="btn-grid">
          <button data-expr="happy"   class="btn btn-expr">Happy</button>
          <button data-expr="curious" class="btn btn-expr">Curious</button>
          <button data-expr="blink"   class="btn btn-expr">Blink</button>
          <button data-expr="wink"    class="btn btn-expr">Wink</button>
          <button data-expr="angry"   class="btn btn-expr">Angry</button>
          <button data-expr="shock"   class="btn btn-expr">Shock</button>
          <button data-expr="scan"    class="btn btn-expr">Scan</button>
          <button data-expr="sleep"   class="btn btn-expr">Sleepy</button>
        </div>
      </div>
      <div class="control-group">
        <h3>Manual Pose</h3>
        <div class="slider-row"><label>Head</label>
          <input type="range" id="s-head" min="-38" max="38" value="0"/>
          <span id="v-head">0°</span></div>
        <div class="slider-row"><label>L Arm</label>
          <input type="range" id="s-la" min="-150" max="60" value="0"/>
          <span id="v-la">0°</span></div>
        <div class="slider-row"><label>R Arm</label>
          <input type="range" id="s-ra" min="-60" max="150" value="0"/>
          <span id="v-ra">0°</span></div>
        <div class="slider-row"><label>L Leg</label>
          <input type="range" id="s-ll" min="-42" max="42" value="0"/>
          <span id="v-ll">0°</span></div>
        <div class="slider-row"><label>R Leg</label>
          <input type="range" id="s-rl" min="-42" max="42" value="0"/>
          <span id="v-rl">0°</span></div>
        <button id="btn-reset" class="btn btn-secondary">↺ Reset</button>
      </div>
    </div>
  </main>
</div>
<script type="module" src="/main.js"></script>
</body>
</html>
