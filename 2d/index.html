<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Codernaught 2D — platformer sprite</title>
<style>
  :root { --purple:#7000F4; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#0d0d14; color:#cfcfe0; font:14px/1.5 ui-monospace,Menlo,monospace; overflow:hidden; }
  #stage { position:fixed; inset:0; }
  /* parallax sky + ground "platform" world */
  #world { position:absolute; inset:0; background:
    radial-gradient(1200px 600px at 50% -10%, #1b1240 0%, #0d0d14 60%); }
  .ground { position:absolute; left:0; right:0; bottom:0; height:90px;
    background:linear-gradient(#241a4d,#160f30); border-top:3px solid #7000F4; }
  .platform { position:absolute; height:22px; background:#241a4d; border:3px solid #7000F4;
    border-radius:6px; }
  #panel { position:absolute; top:14px; left:14px; background:rgba(20,20,30,.82);
    border:1px solid #2a2a3c; border-radius:10px; padding:12px 14px; font-size:12px; min-width:200px; backdrop-filter:blur(6px); }
  #panel h1 { font-size:12px; letter-spacing:1px; color:var(--purple); margin-bottom:8px; }
  #panel .k { color:var(--purple); }
  #panel .row { margin:5px 0; }
  #bot { position:absolute; width:130px; height:215px; will-change:transform; }
  .hint { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); color:#777; font-size:12px; }
</style>
</head>
<body>
<div id="stage">
  <div id="world">
    <div class="platform" style="left:12%;  bottom:200px; width:170px"></div>
    <div class="platform" style="left:42%;  bottom:320px; width:150px"></div>
    <div class="platform" style="left:70%;  bottom:230px; width:180px"></div>
    <div class="ground"></div>
    <div id="bot"></div>
  </div>
  <div id="panel">
    <h1>CODERNAUGHT 2D</h1>
    <div class="row"><span class="k">← →</span> run</div>
    <div class="row"><span class="k">space</span> jump (double = fly)</div>
    <div class="row"><span class="k">F</span> toggle fly mode</div>
    <div class="row" id="state">state: idle</div>
  </div>
  <div class="hint">a 2D platformer Codernaught · arrow keys + space</div>
</div>
<script type="module" src="./platformer.js"></script>
</body>
</html>
